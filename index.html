<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario - Stage 1</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="800" height="600"></canvas>
        <div id="hud">
            <div class="hud-item">
                <span class="hud-label">MARIO</span>
                <span id="hud-score">000000</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">COINS</span>
                <span id="hud-coins">x00</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">WORLD</span>
                <span id="hud-world">1-1</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">TIME</span>
                <span id="hud-time">400</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">LIVES</span>
                <span id="hud-lives">x03</span>
            </div>
        </div>
    </div>

    <script src="js/sprites.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/player.js"></script>
    <script src="js/level.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
